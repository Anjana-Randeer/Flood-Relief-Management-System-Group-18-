<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Relief Request</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
    <span>Flood Relief System (User)</span>
    <div>
        <a href="dashboard_user.php">Dashboard</a>
        <a href="logout.php">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="card">
        <h2 style="text-align: center;">New Flood Relief Request</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Please provide accurate information to help us coordinate aid effectively.</p>

        <form id="reliefForm" action="submit_request.php" method="POST">

            <div class="form-section">
                <h4>1. Contact Information</h4>
                <div class="input-row">
                    <div class="form-group">
                        <label>Contact Person Name</label>
                        <input type="text" name="contact_name" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="tel" name="contact_number" placeholder="07X XXX XXXX" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Current Address</label>
                    <textarea name="address" rows="2" placeholder="Primary residence address" required></textarea>
                </div>
            </div>

            <div class="form-section">
                <h4>2. Location & Household Details</h4>
                <div class="input-row">
                    <div class="form-group">
                        <label>District</label>
                        <input type="text" name="district" required>
                    </div>
                    <div class="form-group">
                        <label>Divisional Secretariat</label>
                        <input type="text" name="divisional_secretariat" required>
                    </div>
                </div>
                <div class="input-row">
                    <div class="form-group">
                        <label>GN Division</label>
                        <input type="text" name="gn_division" required>
                    </div>
                    <div class="form-group">
                        <label>Family Members</label>
                        <input type="number" name="family_members" min="1" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h4>3. Relief Requirements</h4>
                <div class="input-row">
                    <div class="form-group">
                        <label>Type of Relief</label>
                        <select name="relief_type" required>
                            <option value="">-- Choose --</option>
                            <option value="Food">Food</option>
                            <option value="Water">Water</option>
                            <option value="Medicine">Medicine</option>
                            <option value="Shelter">Shelter</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Flood Severity Level</label>
                        <select name="flood_severity" required>
                            <option value="">-- Choose --</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Additional Description</label>
                    <textarea name="description" rows="3" placeholder="Mention special requirements (e.g., infant formula, elderly care)"></textarea>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Submit Request</button>
                <button type="reset" class="btn btn-danger" style="flex: 1;">Clear Form</button>
            </div>
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
